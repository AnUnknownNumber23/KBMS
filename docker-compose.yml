services:
  # ── Neo4j 知识图谱数据库 ──────────────────────
  neo4j:
    image: neo4j:community
    container_name: agenthub-neo4j
    ports:
      - "7474:7474"   # Web UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redpanda (Kafka 兼容消息队列，CDC 增量更新) ──
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: agenthub-redpanda
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --advertise-kafka-addr=localhost:9092
      - --kafka-addr=0.0.0.0:9092

volumes:
  neo4j_data:
